name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Rust unit tests ─────────────────────────────────────────────────────────
  rust-test:
    name: Rust tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy (no extension-module)
        run: cargo clippy --lib -- -D warnings

      - name: cargo clippy (extension-module, check PyO3 bindings compile)
        run: cargo clippy --lib --features extension-module -- -D warnings

      - name: cargo test (lib, no extension-module)
        run: cargo test --lib

  # ── Python tests (maturin develop + pytest) ─────────────────────────────────
  python-test:
    name: Python tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Add venv to PATH (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "${{ github.workspace }}/.venv/bin" >> $GITHUB_PATH
          echo "VIRTUAL_ENV=${{ github.workspace }}/.venv" >> $GITHUB_ENV

      - name: Add venv to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_PATH "${{ github.workspace }}\.venv\Scripts"
          Add-Content $env:GITHUB_ENV "VIRTUAL_ENV=${{ github.workspace }}\.venv"

      - name: Install maturin + dev deps
        run: pip install maturin pytest requests fastapi uvicorn psutil

      - name: Build & install Rust extension (maturin develop)
        run: maturin develop --features extension-module

      - name: Run Python tests
        run: pytest tests/ -v --tb=short

  # ── Build wheels (smoke-check only, no upload) ───────────────────────────────
  build-wheels:
    name: Build wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features pyo3/extension-module
          manylinux: auto

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: target/wheels/*.whl
